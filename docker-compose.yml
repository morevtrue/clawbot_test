services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    volumes:
      - ./.docker/openclaw/config:/home/node/.openclaw
      - ./.docker/openclaw/workspace:/home/node/.openclaw/workspace
    environment:
      # OpenRouter — вставь ключ из openrouter.ai
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Токен шлюза (генерируется автоматически при первом запуске, если не задан)
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_BIND=lan
      # Прокси для обхода блокировок Telegram в России
      - HTTP_PROXY=socks5://xray:10808
      - HTTPS_PROXY=socks5://xray:10808
      - ALL_PROXY=socks5://xray:10808
    mem_limit: 2g
    memswap_limit: 3g
    networks:
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`${OPENCLAW_DOMAIN}`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik_public:
    external: true
